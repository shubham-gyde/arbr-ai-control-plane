name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci

      - name: Lint server
        run: npm run lint

      - name: Test server (unit + integration)
        run: npm run test:server

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Build dashboard
        run: npm run web:build

      - name: JS SDK unit tests
        run: npm --prefix clients/js test

      - name: Docker build (smoke test)
        run: docker build -t arbr-control-plane:ci .

  python-sdk:
    name: Python SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install Python SDK with dev extras
        run: pip install -e ".[dev,langchain]"
        working-directory: clients/python

      - name: Run tests
        run: python -m pytest -q
        working-directory: clients/python

  # Publish a SHA-pinned image ONLY after the full test/lint/build gate passes on main.
  # An image existing for a commit therefore means "CI green" — that is the deploy gate
  # consumed by ops/deploy.sh. Nothing is deployed here; deploys stay manually triggered.
  publish-image:
    name: Publish image (green main)
    runs-on: ubuntu-latest
    needs: [build, python-sdk]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/project-arbr/arbr-control-plane
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=main

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
